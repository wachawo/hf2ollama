name: Check linked issue

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  check-issue:
    runs-on: ubuntu-latest
    # Bots (dependabot, renovate, github-actions) bypass this check.
    if: github.event.pull_request.user.type != 'Bot' && github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Verify PR references an issue assigned to the author
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const text = `${pr.title || ''}\n${pr.body || ''}`;

            // GitHub's own linking keywords: fix, fixes, fixed, close, closes, closed, resolve, resolves, resolved.
            // We accept both "Fixes #123" and "Fixes owner/repo#123" but only enforce assignment for same-repo issues.
            const re = /\b(?:fix(?:es|ed)?|close[sd]?|resolve[sd]?)\s+(?:([\w.-]+)\/([\w.-]+))?#(\d+)/gi;
            const matches = [...text.matchAll(re)];

            if (matches.length === 0) {
              core.setFailed(
                'This PR does not reference any issue.\n' +
                'Add a GitHub linking keyword like "Fixes #123", "Closes #123" or "Resolves #123" ' +
                'to the PR description, pointing at an issue assigned to you.'
              );
              return;
            }

            const sameRepoIssues = matches
              .filter(m => !m[1] || (m[1] === context.repo.owner && m[2] === context.repo.repo))
              .map(m => parseInt(m[3], 10));

            if (sameRepoIssues.length === 0) {
              core.setFailed(
                'This PR references only cross-repo issues. Link at least one issue in this repository ' +
                '(assigned to you) so we can verify ownership.'
              );
              return;
            }

            const unique = [...new Set(sameRepoIssues)];
            const problems = [];
            let okCount = 0;

            for (const num of unique) {
              let issue;
              try {
                ({ data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                }));
              } catch (e) {
                problems.push(`Issue #${num}: cannot fetch (${e.status || ''} ${e.message}).`);
                continue;
              }
              if (issue.pull_request) {
                // The referenced number is itself a PR, not an Issue — skip.
                problems.push(`#${num} is a pull request, not an issue.`);
                continue;
              }
              const assignees = (issue.assignees || []).map(u => u.login);
              if (assignees.includes(author)) {
                okCount += 1;
                core.info(`OK: issue #${num} is assigned to @${author}`);
              } else {
                problems.push(
                  `Issue #${num} is not assigned to @${author}. ` +
                  `Current assignees: ${assignees.length ? assignees.map(a => '@' + a).join(', ') : '(none)'}.`
                );
              }
            }

            if (okCount === 0) {
              core.setFailed(
                'No referenced issue is assigned to the PR author.\n\n' +
                problems.join('\n') +
                '\n\nAsk a maintainer to assign the issue to you, or pick a different issue.'
              );
            }
